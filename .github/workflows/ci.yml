name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build -ldflags "-X main.Version=$(git describe --tags --always --dirty)" ./...

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc)" -eq 1 ]; then
            echo "::error::Test coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build -ldflags "-X main.Version=$(git describe --tags --always --dirty)" -o gotk ./cmd/gotk/

      - name: Benchmark
        run: ./gotk bench --json

      - name: Quality score
        run: |
          OUTPUT=$(./gotk bench --quality --json)
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep -o '"overall_score": [0-9.]*' | grep -o '[0-9.]*')
          echo "Quality score: ${SCORE}%"
          # Fail if quality drops below 40% (intentional compression means 100% is not the target)
          if [ "$(echo "$SCORE < 40" | bc)" -eq 1 ]; then
            echo "::error::Quality score ${SCORE}% is below 40% threshold"
            exit 1
          fi

      - name: Per-filter report
        run: ./gotk bench --per-filter
