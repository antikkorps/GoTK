name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Build
        run: go build -ldflags "-s -w -X main.Version=$(git describe --tags --always --dirty)" ./...

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc)" -eq 1 ]; then
            echo "::error::Test coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

  test-windows:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      # Smoke-build the Windows binary so a regression on cross-compile
      # surfaces immediately. Coverage gate stays on the Linux job; the
      # goal here is platform parity on build + tests.
      - name: Build
        shell: pwsh
        run: |
          $version = (git describe --tags --always --dirty)
          go build -ldflags "-s -w -X main.Version=$version" -o gotk.exe ./cmd/gotk/
          .\gotk.exe --version

      # -race needs CGO_ENABLED=1 on Windows; the Linux job already
      # exercises the race detector, so we run plain `go test` here.
      - name: Test
        shell: pwsh
        run: go test ./...

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Build
        run: go build -ldflags "-s -w -X main.Version=$(git describe --tags --always --dirty)" -o gotk ./cmd/gotk/

      - name: Benchmark
        run: ./gotk bench --json

      - name: Quality score
        run: |
          OUTPUT=$(./gotk bench --quality --json)
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep -o '"overall_score": [0-9.]*' | grep -o '[0-9.]*')
          echo "Quality score: ${SCORE}%"
          # Fail if quality drops below 40% (intentional compression means 100% is not the target)
          if [ "$(echo "$SCORE < 40" | bc)" -eq 1 ]; then
            echo "::error::Quality score ${SCORE}% is below 40% threshold"
            exit 1
          fi

      - name: Per-filter report
        run: ./gotk bench --per-filter

      - name: Benchmark regression check
        run: |
          RESULT=$(./gotk bench --json)
          AVG=$(echo "$RESULT" | grep -o '"avg_reduction": [0-9.]*' | grep -o '[0-9.]*')
          echo "Average reduction: ${AVG}%"
          if [ "$(echo "$AVG < 50" | bc)" -eq 1 ]; then
            echo "::error::Average reduction ${AVG}% dropped below 50% baseline"
            exit 1
          fi

      - name: Binary size check
        run: |
          SIZE=$(stat -c%s gotk 2>/dev/null || stat -f%z gotk)
          SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB}MB (${SIZE} bytes)"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::warning::Binary size ${SIZE_MB}MB exceeds 5MB target"
          fi
